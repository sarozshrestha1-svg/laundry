<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumla Laundry Care | Digital Billing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Prata&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1e3a8a; /* Deep Navy */
        --primary-light: #eff6ff;
        --accent: #3b82f6; /* Bright Blue */
        --success: #10b981;
        --dark: #0f172a;
        --muted: #64748b;
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "DM Sans", sans-serif;
        margin: 0;
        background-color: var(--bg);
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
        color: var(--dark);
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .app-container {
        width: 100%;
        max-width: 480px;
        background: var(--surface);
        min-height: 100vh;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      header {
        background: var(--primary);
        color: white;
        padding: 40px 24px 30px;
        text-align: center;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        position: relative;
        overflow: hidden;
      }

      header::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      header h1 {
        font-family: "Prata", serif;
        margin: 0;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.5px;
      }

      header p {
        margin: 8px 0 0;
        opacity: 0.8;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .content {
        padding: 24px;
        flex: 1;
        padding-bottom: 120px;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        margin: 32px 0 12px 4px;
        letter-spacing: 1.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        transition: box-shadow 0.3s ease;
      }

      .card:hover {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
      }

      .input-group {
        margin-bottom: 20px;
      }
      .input-group:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--dark);
      }

      input,
      select {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-family: inherit;
        color: var(--dark);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        background: var(--bg);
      }

      input::placeholder {
        color: #94a3b8;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        outline: none;
        background: var(--surface);
        box-shadow: 0 0 0 4px var(--primary-light);
      }

      .row {
        display: flex;
        gap: 16px;
      }
      .row > * {
        flex: 1;
      }

      /* Dynamic Item List */
      .item-row {
        display: grid;
        grid-template-columns: auto 1fr 80px;
        gap: 12px;
        margin-bottom: 12px;
        align-items: center;
        animation: slideIn 0.3s ease forwards;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .item-row:last-child {
        margin-bottom: 0;
      }

      .checkbox-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
      }

      .checkbox-custom {
        width: 20px;
        height: 20px;
        accent-color: var(--accent);
        cursor: pointer;
        margin: 0;
      }

      .pcs-input {
        text-align: center;
        font-weight: 600;
        padding-left: 8px;
        padding-right: 8px;
      }

      /* Floating Footer Calculation */
      .footer-billing {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 480px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 24px;
        border-top: 1px solid var(--border);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        z-index: 10;
      }

      .price-summary {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 20px;
      }

      .price-summary .label {
        font-weight: 600;
        color: var(--muted);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .price-summary .total {
        font-family: "Prata", serif;
        font-size: 32px;
        line-height: 1;
        color: var(--primary);
      }

      .price-summary .currency {
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--muted);
        margin-right: 4px;
        vertical-align: super;
      }

      .wa-button {
        background: var(--dark);
        color: white;
        width: 100%;
        padding: 18px;
        border: none;
        border-radius: var(--radius-md);
        font-size: 16px;
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
      }

      .wa-button:hover {
        background: #000;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.3);
      }

      .wa-button:active {
        transform: scale(0.98);
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.2);
      }

      .wa-icon {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Mobile Adjustments */
      @media (max-width: 480px) {
        body {
          background: var(--surface);
        }
        .app-container {
          box-shadow: none;
          border-radius: 0;
        }
        header {
          border-radius: 0 0 24px 24px;
        }
        .content {
          padding: 20px;
        }
        .footer-billing {
          position: sticky;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Jumla Laundry Care</h1>
        <p>Digital Receipt System • 9866631883</p>
      </header>

      <div class="content">
        <div class="section-title">Customer Details</div>
        <div class="card">
          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="cName" placeholder="Enter customer name" />
          </div>
          <div class="input-group">
            <label>WhatsApp Number</label>
            <input
              type="tel"
              id="cPhone"
              placeholder="e.g. 98XXXXXXXX"
              pattern="[0-9]*"
            />
          </div>
        </div>

        <div class="section-title">Service Details</div>
        <div class="card">
          <div class="row">
            <div class="input-group">
              <label>Weight (Kg)</label>
              <input
                type="number"
                id="cWeight"
                step="0.1"
                min="0"
                placeholder="0.0"
                oninput="calculate()"
              />
            </div>
            <div class="input-group">
              <label>Service Type</label>
              <select id="cService" onchange="calculate()">
                <option value="100">Normal Wash (Rs 100/kg)</option>
                <option value="200">Express Wash (Rs 200/kg)</option>
              </select>
            </div>
          </div>
          <div class="row" style="margin-top: 20px">
            <div class="input-group">
              <label>Entry Date (BS)</label>
              <input type="text" id="cDate" placeholder="YYYY-MM-DD" />
            </div>
            <div class="input-group">
              <label>Expected Delivery</label>
              <input type="text" id="cDelivery" placeholder="YYYY-MM-DD" />
            </div>
          </div>
        </div>

        <div class="section-title">Cloth Items Registry</div>
        <div class="card" id="dynamicItems">
          <div class="item-row">
            <div class="checkbox-wrapper">
              <input
                type="checkbox"
                class="checkbox-custom"
                onchange="calculate()"
              />
            </div>
            <input
              type="text"
              placeholder="Item description"
              oninput="addNewRow(this)"
            />
            <input
              type="number"
              class="pcs-input"
              value="1"
              min="1"
              placeholder="Pcs"
            />
          </div>
        </div>

        <div class="section-title">Logistics & Extras</div>
        <div class="card">
          <div class="input-group">
            <label>Additional / Delivery Fee</label>
            <input
              type="number"
              id="cDelFee"
              min="0"
              placeholder="0"
              oninput="calculate()"
            />
          </div>
        </div>
      </div>

      <div class="footer-billing">
        <div class="price-summary">
          <span class="label">Amount Payable</span>
          <span class="total"
            ><span class="currency">Rs</span><span id="cTotal">0.00</span></span
          >
        </div>
        <button type="button" class="wa-button" onclick="finalizeOrder()">
          <svg
            class="wa-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"
            />
          </svg>
          Confirm & Send WhatsApp
        </button>
      </div>
    </div>

    <script>
      // Replace with your Google Apps Script URL
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbxLDwEN4-HN1d-7tA8q508qYGuicVVW54-Mlbm04NWdU1Id8syU7dqhvpZQ4C3hhayG/exec";

      function calculate() {
        const weight =
          parseFloat(document.getElementById("cWeight").value) || 0;
        const rate = parseFloat(document.getElementById("cService").value) || 0;
        const del = parseFloat(document.getElementById("cDelFee").value) || 0;
        const total = weight * rate + del;
        document.getElementById("cTotal").innerText = total.toLocaleString(
          "en-IN",
          { minimumFractionDigits: 2, maximumFractionDigits: 2 },
        );
      }

      function addNewRow(input) {
        const container = document.getElementById("dynamicItems");
        const rows = container.getElementsByClassName("item-row");
        const lastInput =
          rows[rows.length - 1].querySelector('input[type="text"]');

        if (input === lastInput && input.value.trim() !== "") {
          const newRow = document.createElement("div");
          newRow.className = "item-row";
          newRow.innerHTML = `
                <div class="checkbox-wrapper">
                    <input type="checkbox" class="checkbox-custom" onchange="calculate()">
                </div>
                <input type="text" placeholder="Item description" oninput="addNewRow(this)">
                <input type="number" class="pcs-input" value="1" min="1" placeholder="Pcs">
            `;
          container.appendChild(newRow);
        }
      }

      function getItemsList() {
        const rows = document.querySelectorAll(".item-row");
        let selected = [];
        rows.forEach((row) => {
          const check = row.querySelector('input[type="checkbox"]');
          const name = row.querySelector('input[type="text"]').value;
          const pcs = row.querySelector('input[type="number"]').value;
          if (check.checked && name.trim())
            selected.push(`${name.trim()} (${pcs || 1} Pcs)`);
        });
        return selected.join(", ");
      }

      function getPlainTextBill() {
        return (
          `*JUMLA LAUNDRY CARE*\n` +
          `--------------------------\n` +
          `*Customer*: ${document.getElementById("cName").value}\n` +
          `*Date*: ${document.getElementById("cDate").value || "N/A"}\n` +
          `*Items*: ${getItemsList() || "General"}\n` +
          `*Service*: ${document.getElementById("cService").options[document.getElementById("cService").selectedIndex].text}\n` +
          `*Weight*: ${document.getElementById("cWeight").value || 0} Kg\n` +
          `*Delivery*: ${document.getElementById("cDelivery").value || "Pending"}\n` +
          `--------------------------\n` +
          `*TOTAL BILL: Rs ${document.getElementById("cTotal").innerText}*\n` +
          `--------------------------\n` +
          `Thank you! Visit again.\n` +
          `\n` +
          `💳 *Scan to Pay (QR)*:\nhttps://sarozshrestha1-svg.github.io/laundry/qr.jpeg`
        );
      }

      async function finalizeOrder() {
        const name = document.getElementById("cName").value.trim();
        const phone = document.getElementById("cPhone").value.trim();

        if (!name || !phone) {
          alert("Please fill in Customer Name and WhatsApp number.");
          return;
        }

        // 1. SAVE TO GOOGLE SHEET AUTOMATICALLY
        const data = new FormData();
        data.append("Name", name);
        data.append("Phone", phone);
        data.append("Total", document.getElementById("cTotal").innerText);
        data.append("Date", document.getElementById("cDate").value);
        data.append("Items", getItemsList());

        // Background fetch to keep UI responsive. Fixed SCRIPT_URL to scriptURL.
        fetch(scriptURL, { method: "POST", body: data }).catch((e) =>
          console.log("Sheet error", e),
        );

        // 2. REDIRECT TO WHATSAPP
        const bill = getPlainTextBill();
        // WhatsApp requires country code. Assuming Nepal (977).
        const waUrl = `https://wa.me/977${phone.replace(/[^0-9]/g, "")}?text=${encodeURIComponent(bill)}`;
        window.open(waUrl, "_blank");
      }
    </script>
  </body>
</html>
