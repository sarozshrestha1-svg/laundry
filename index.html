<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumla Laundry Care | Digital Billing</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background-color: #f1f5f9; 
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .app-container { 
            width: 100%;
            max-width: 500px; 
            background: white; 
            min-height: 100vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding-bottom: 40px;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 25px 25px;
        }

        header h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }

        .content { padding: 20px; }

        .section-title { 
            font-size: 12px; 
            font-weight: 700; 
            color: #64748b; 
            text-transform: uppercase; 
            margin: 25px 0 10px 5px;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475569; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px; 
            transition: all 0.2s;
            box-sizing: border-box;
            background: white;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* Dynamic Item List */
        .item-row { 
            display: grid; 
            grid-template-columns: 40px 1fr 70px; 
            gap: 10px; 
            margin-bottom: 10px; 
            align-items: center;
        }
        
        .checkbox-custom {
            width: 22px; height: 22px;
            accent-color: var(--primary);
        }

        .pcs-input { text-align: center; font-weight: 600; }

        /* Floating Footer Calculation */
        .footer-billing {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px;
            border-top: 1px solid var(--border);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .price-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .price-summary span:first-child { font-weight: 600; color: #64748b; }
        .price-summary .total { font-size: 24px; font-weight: 800; color: var(--primary); }

        .wa-button {
            background: var(--success);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .wa-button:active { transform: scale(0.98); }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .app-container { box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Jumla Laundry Care</h1>
        <p>Digital Receipt System • 9866631883</p>
    </header>

    <div class="content">
        <div class="section-title">Customer Details</div>
        <div class="card">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="cName" placeholder="Enter name">
            </div>
            <div class="input-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="cPhone" placeholder="98XXXXXXXX">
            </div>
        </div>

        <div class="section-title">Service Details</div>
        <div class="card">
            <div class="input-group">
                <label>Weight (Kg)</label>
                <input type="number" id="cWeight" step="0.1" value="0" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Wash Type</label>
                <select id="cService" onchange="calculate()">
                    <option value="100">Normal Wash (Rs 100/kg)</option>
                    <option value="200">Express Wash (Rs 200/kg)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Entry Date (BS)</label>
                    <input type="text" id="cDate" placeholder="2083-01-01">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Delivery Date</label>
                    <input type="text" id="cDelivery" placeholder="2083-01-03">
                </div>
            </div>
        </div>

        <div class="section-title">Cloth Items (Tick & Set Pcs)</div>
        <div class="card" id="dynamicItems">
            <div class="item-row">
                <input type="checkbox" class="checkbox-custom" onchange="calculate()">
                <input type="text" placeholder="Item name" oninput="addNewRow(this)">
                <input type="number" class="pcs-input" value="1" min="1">
            </div>
        </div>

        <div class="section-title">Logistics</div>
        <div class="card">
            <div class="input-group">
                <label>Delivery Fee (Manual)</label>
                <input type="number" id="cDelFee" value="0" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="footer-billing">
        <div class="price-summary">
            <span>Amount Payable</span>
            <span class="total">Rs <span id="cTotal">0.00</span></span>
        </div>
        <button type="button" class="wa-button" onclick="finalizeOrder()">
            Confirm & Send WhatsApp
        </button>
    </div>
</div>

<script>
    // Replace with your Google Apps Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxLDwEN4-HN1d-7tA8q508qYGuicVVW54-Mlbm04NWdU1Id8syU7dqhvpZQ4C3hhayG/exec'; // Replace this later!

    function calculate() {
        const weight = parseFloat(document.getElementById('cWeight').value) || 0;
        const rate = parseFloat(document.getElementById('cService').value);
        const del = parseFloat(document.getElementById('cDelFee').value) || 0;
        const total = (weight * rate) + del;
        document.getElementById('cTotal').innerText = total.toLocaleString('en-IN', {minimumFractionDigits: 2});
    }

    function addNewRow(input) {
        const container = document.getElementById('dynamicItems');
        const rows = container.getElementsByClassName('item-row');
        const lastInput = rows[rows.length - 1].querySelector('input[type="text"]');

        if (input === lastInput && input.value.trim() !== "") {
            const newRow = document.createElement('div');
            newRow.className = 'item-row';
            newRow.innerHTML = `
                <input type="checkbox" class="checkbox-custom" onchange="calculate()">
                <input type="text" placeholder="Item name" oninput="addNewRow(this)">
                <input type="number" class="pcs-input" value="1" min="1">
            `;
            container.appendChild(newRow);
        }
    }

    function getItemsList() {
        const rows = document.querySelectorAll('.item-row');
        let selected = [];
        rows.forEach(row => {
            const check = row.querySelector('input[type="checkbox"]');
            const name = row.querySelector('input[type="text"]').value;
            const pcs = row.querySelector('input[type="number"]').value;
            if (check.checked && name.trim()) selected.push(`${name} (${pcs} Pcs)`);
        });
        return selected.join(", ");
    }

    function getPlainTextBill() {
        return `JUMLA LAUNDRY CARE\n` +
               `--------------------------\n` +
               `Customer: ${document.getElementById('cName').value}\n` +
               `Date: ${document.getElementById('cDate').value}\n` +
               `Items: ${getItemsList() || 'General'}\n` +
               `Service: ${document.getElementById('cService').options[document.getElementById('cService').selectedIndex].text}\n` +
               `Weight: ${document.getElementById('cWeight').value} Kg\n` +
               `Delivery: ${document.getElementById('cDelivery').value}\n` +
               `--------------------------\n` +
               `TOTAL BILL: Rs ${document.getElementById('cTotal').innerText}\n` +
               `--------------------------\n` +
               `Thank you! Visit again.`;
    }

    async function finalizeOrder() {
        const name = document.getElementById('cName').value;
        const phone = document.getElementById('cPhone').value;
        
        if(!name || !phone) {
            alert("Please fill in Name and Phone number");
            return;
        }

        // 1. SAVE TO GOOGLE SHEET AUTOMATICALLY
        const data = new FormData();
        data.append("Name", name);
        data.append("Phone", phone);
        data.append("Total", document.getElementById('cTotal').innerText);
        data.append("Date", document.getElementById('cDate').value);
        data.append("Items", getItemsList());

        // We run fetch without waiting (background) to keep UI fast
        fetch(SCRIPT_URL, { method: 'POST', body: data }).catch(e => console.log("Sheet error", e));

        // 2. REDIRECT TO WHATSAPP
        const bill = getPlainTextBill();
        const waUrl = `https://wa.me/977${phone}?text=${encodeURIComponent(bill)}`;
        window.open(waUrl, '_blank');
    }
</script>

</body>
</html>
