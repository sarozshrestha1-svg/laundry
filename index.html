<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumla Laundry Care - Digital Billing</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .sub-text { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* Dynamic Item Section */
        .item-section { border: 1px solid #eee; padding: 15px; border-radius: 5px; background: #fafafa; margin-bottom: 20px; }
        .item-row { display: grid; grid-template-columns: 40px 1fr 80px; gap: 10px; align-items: center; margin-bottom: 8px; }
        .item-row input[type="checkbox"] { width: 20px; height: 20px; }
        .item-row input[type="number"] { text-align: center; }

        .bill-box { background: #2c3e50; color: white; padding: 15px; border-radius: 5px; margin-top: 20px; display: flex; justify-content: space-between; }
        .total-price { font-size: 22px; font-weight: bold; color: #27ae60; }

        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .save-btn { background: #95a5a6; color: white; }
        .wa-btn { background: #27ae60; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Jumla Laundry Care</h2>
    <p class="sub-text">Digital Billing System | 9866631883</p>

    <form id="laundryForm">
        <div class="grid">
            <div>
                <label>Customer Name</label>
                <input type="text" id="cName" required>
            </div>
            <div>
                <label>WhatsApp Number</label>
                <input type="text" id="cPhone" placeholder="98XXXXXXXX" required>
            </div>
            <div>
                <label>Weight (Kg)</label>
                <input type="number" id="cWeight" step="0.1" value="0" oninput="calculate()">
            </div>
            <div>
                <label>Service Type</label>
                <select id="cService" onchange="calculate()">
                    <option value="100">Normal Wash (Rs 100/kg)</option>
                    <option value="200">Express Wash (Rs 200/kg)</option>
                </select>
            </div>
            <div>
                <label>Entry Date (Nepali)</label>
                <input type="text" id="cDate" placeholder="2083-01-01">
            </div>
            <div>
                <label>Delivery Date</label>
                <input type="text" id="cDelivery" placeholder="2083-01-03">
            </div>
        </div>

        <label>Cloths Details (Tick / Name / Pieces)</label>
        <div class="item-section" id="dynamicItems">
            <div class="item-row">
                <input type="checkbox" onchange="calculate()">
                <input type="text" placeholder="Cloth Name (e.g. Shirt)" oninput="addNewRow(this)">
                <input type="number" placeholder="Pcs" min="1" value="1">
            </div>
        </div>

        <div class="grid" style="margin-top: 15px;">
            <div>
                <label>Delivery Option</label>
                <select id="cDelOption" onchange="applyDelFee()">
                    <option value="0">Store Drop (Rs 0)</option>
                    <option value="100">Pick up/Delivery (Rs 100)</option>
                </select>
            </div>
            <div>
                <label>Delivery Fee (Manual)</label>
                <input type="number" id="cDelFee" value="0" oninput="calculate()">
            </div>
        </div>

        <div class="bill-box">
            <span>Total Amount:</span>
            <span class="total-price">Rs <span id="cTotal">0</span></span>
        </div>

        <div class="btn-container">
            <button type="button" class="save-btn" onclick="saveData()">1. SAVE DATA</button>
            <button type="button" class="wa-btn" onclick="sendWA()">2. SEND TO WHATSAPP</button>
        </div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxLDwEN4-HN1d-7tA8q508qYGuicVVW54-Mlbm04NWdU1Id8syU7dqhvpZQ4C3hhayG/exec'; // Replace this later!

    // Function to add a new row automatically when the current last row is typed in
    function addNewRow(input) {
        const container = document.getElementById('dynamicItems');
        const rows = container.getElementsByClassName('item-row');
        const lastRow = rows[rows.length - 1];
        const lastInput = lastRow.querySelector('input[type="text"]');

        // If the user started typing in the last existing row, create a new empty one
        if (input === lastInput && input.value.trim() !== "") {
            const newRow = document.createElement('div');
            newRow.className = 'item-row';
            newRow.innerHTML = `
                <input type="checkbox" onchange="calculate()">
                <input type="text" placeholder="Cloth Name" oninput="addNewRow(this)">
                <input type="number" placeholder="Pcs" min="1" value="1">
            `;
            container.appendChild(newRow);
        }
    }

    function applyDelFee() {
        document.getElementById('cDelFee').value = document.getElementById('cDelOption').value;
        calculate();
    }

    function calculate() {
        const weight = parseFloat(document.getElementById('cWeight').value) || 0;
        const rate = parseFloat(document.getElementById('cService').value);
        const del = parseFloat(document.getElementById('cDelFee').value) || 0;
        const total = (weight * rate) + del;
        document.getElementById('cTotal').innerText = total.toFixed(2);
    }

    function getItemsList() {
        const rows = document.querySelectorAll('.item-row');
        let itemStrings = [];
        rows.forEach(row => {
            const checkbox = row.querySelector('input[type="checkbox"]');
            const name = row.querySelector('input[type="text"]').value;
            const pcs = row.querySelector('input[type="number"]').value;
            
            if (checkbox.checked && name.trim() !== "") {
                itemStrings.push(`${name} (${pcs} Pcs)`);
            }
        });
        return itemStrings.join(", ");
    }

    function getPlainTextBill() {
        const name = document.getElementById('cName').value;
        const weight = document.getElementById('cWeight').value;
        const wash = document.getElementById('cService').options[document.getElementById('cService').selectedIndex].text;
        const total = document.getElementById('cTotal').innerText;
        const entry = document.getElementById('cDate').value;
        const delivery = document.getElementById('cDelivery').value;
        const itemsList = getItemsList();

        return `JUMLA LAUNDRY CARE\n` +
               `--------------------------\n` +
               `Customer: ${name}\n` +
               `Date: ${entry}\n` +
               `Items: ${itemsList || 'General'}\n` +
               `Service: ${wash}\n` +
               `Weight: ${weight} Kg\n` +
               `Delivery Date: ${delivery}\n` +
               `--------------------------\n` +
               `TOTAL BILL: Rs ${total}\n` +
               `--------------------------\n` +
               `Thank you! Visit again.`;
    }

    function saveData() {
        if (!document.getElementById('cName').value) return alert("Please enter Customer Name");
        
        const data = new FormData();
        data.append("Name", document.getElementById('cName').value);
        data.append("Phone", document.getElementById('cPhone').value);
        data.append("Total", document.getElementById('cTotal').innerText);
        data.append("Date", document.getElementById('cDate').value);
        data.append("Items", getItemsList());

        fetch(SCRIPT_URL, { method: 'POST', body: data })
            .then(() => alert("Saved to Sheet!"))
            .catch(() => alert("Error saving."));
    }

    function sendWA() {
        const phone = document.getElementById('cPhone').value;
        const bill = getPlainTextBill();
        if (!phone) return alert("Please enter Phone Number");

        const url = `https://wa.me/977${phone}?text=${encodeURIComponent(bill)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
